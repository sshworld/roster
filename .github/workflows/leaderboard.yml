name: Leaderboard

on:
  schedule:
    - cron: '17 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Re-run benchmarks against latest upstream SHAs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: BENCH_LATEST=1 scripts/bench.sh

      - run: node scripts/update-bench-table.mjs README.md

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Benchmark data is a deterministic script output (docs + README table only),
      # so it is pushed straight to main — no PR, no manual merge.
      # If branch protection is enabled later, allow this workflow to bypass it
      # (see docs/branch-protection.md).
      - name: Commit and push to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/benchmarks README.md
          git commit -m "chore: refresh benchmark leaderboard"
          git pull --rebase origin main
          git push origin HEAD:main
