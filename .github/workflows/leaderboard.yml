name: Leaderboard

on:
  schedule:
    - cron: '17 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Re-run benchmarks against latest upstream SHAs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: BENCH_LATEST=1 scripts/bench.sh

      - run: node scripts/update-bench-table.mjs README.md

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and open leaderboard PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/benchmarks README.md
          git commit -m "chore: refresh benchmark leaderboard"
          git push --force origin HEAD:refs/heads/bot/leaderboard
          gh pr create \
            --title "chore: refresh benchmark leaderboard" \
            --body "Automated weekly re-run of the benchmark suite against the latest upstream SHAs." \
            --base main \
            --head bot/leaderboard \
            || true
          gh workflow run ci.yml --ref bot/leaderboard
